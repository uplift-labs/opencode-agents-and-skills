name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up project toolchain
        run: <setup-command>
      - name: Focused validation
        run: <focused-validation-command>
      - name: Full validation
        run: <validation-command>
